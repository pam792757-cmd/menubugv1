<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hafyx VIP AI</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #0b0e11; color: #e9eaeb; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        .header { background: #1b1f23; padding: 15px; display: flex; align-items: center; border-bottom: 1px solid #30363d; }
        .status-dot { width: 10px; height: 10px; background: #238636; border-radius: 50%; margin-right: 10px; box-shadow: 0 0 10px #238636; }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth; }
        .msg { max-width: 85%; padding: 12px 16px; border-radius: 18px; font-size: 15px; line-height: 1.6; }
        .user { align-self: flex-end; background: #1f6feb; color: white; border-bottom-right-radius: 2px; }
        .bot { align-self: flex-start; background: #21262d; border: 1px solid #30363d; border-bottom-left-radius: 2px; }
        .input-area { background: #1b1f23; padding: 20px; display: flex; gap: 10px; border-top: 1px solid #30363d; }
        input { flex: 1; background: #0d1117; border: 1px solid #30363d; border-radius: 8px; color: white; padding: 12px; outline: none; }
        input:focus { border-color: #58a6ff; }
        button { background: #238636; color: white; border: none; padding: 0 20px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: #2ea043; }
        .loader { font-size: 12px; color: #8b949e; display: none; margin-bottom: 10px; margin-left: 20px; }
    </style>
</head>
<body>

<div class="header">
    <div class="status-dot"></div>
    <span style="font-weight: bold;">HAFYX SMART BOT (GEMINI ENGINE) 👑</span>
</div>

<div id="chat-window">
    <div class="msg bot">Halo Hafyx! Gue udah pake otak Gemini sekarang. Mau nanya apa aja, bahas modding, atau curhat? Gue siap dengerin.</div>
</div>
<div id="loader" class="loader">Bot lagi mikir keras...</div>

<div class="input-area">
    <input type="text" id="userInput" placeholder="Ketik pesan ke teman AI lu..." autocomplete="off">
    <button onclick="chat()">KIRIM</button>
</div>

<script>
    // MASUKKAN API KEY LU DI SINI, HAFYX!
    const API_KEY = "KODE_API_LU_DI_SINI"; 

    async function chat() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if (!text || API_KEY === "AIzaSyDyRMAH8tNpU7BGn1ppJvff8_J393zSHbY") {
            if(API_KEY.includes("KODE")) alert("Hafyx, isi dulu API KEY nya di dalem kode!");
            return;
        }

        addMsg(text, 'user');
        input.value = '';
        document.getElementById('loader').style.display = 'block';

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: `Nama kamu adalah bot teman Hafyx. Bicara dengan bahasa santai, ceplas-ceplos, seperti teman akrab. Gunakan bahasa Indonesia gaul. User adalah Hafyx. Chat: ${text}` }] }]
                })
            });

            const data = await response.json();
            const aiReply = data.candidates[0].content.parts[0].text;
            addMsg(aiReply, 'bot');
        } catch (e) {
            addMsg("Waduh error bro, cek API Key atau kuota internet lu!", "bot");
            console.error(e);
        } finally {
            document.getElementById('loader').style.display = 'none';
        }
    }

    function addMsg(text, sender) {
        const win = document.getElementById('chat-window');
        const div = document.createElement('div');
        div.className = `msg ${sender}`;
        div.innerText = text;
        win.appendChild(div);
        win.scrollTop = win.scrollHeight;
    }

    document.getElementById('userInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') chat(); });
</script>

</body>
</html>
