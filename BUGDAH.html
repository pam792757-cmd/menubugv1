<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FANATIX V2 [VIP] - NEON EXECUTOR</title>
    <style>
        :root {
            --primary: #ff0000;
            --secondary: #660000;
            --bg: #000000;
            --card-bg: rgba(10, 0, 0, 0.95);
            --text: #ffffff;
            --glow: #ff4d4d;
            --font: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: var(--font);
            background: var(--bg);
            background-image: radial-gradient(circle at center, #1a0000 0%, #000000 100%);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            width: 380px;
            background: var(--card-bg);
            border: 2px solid var(--primary);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 0 25px var(--secondary), inset 0 0 15px #000;
            position: relative;
            transition: 0.3s;
        }

        .container:hover {
            box-shadow: 0 0 35px var(--primary), inset 0 0 20px #000;
        }

        h2 {
            text-align: center;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 4px;
            margin: 0 0 5px 0;
            text-shadow: 0 0 15px var(--glow);
            font-size: 28px;
        }

        .subtitle {
            text-align: center;
            font-size: 11px;
            color: #888;
            margin-bottom: 25px;
            border-bottom: 1px solid var(--primary);
            padding-bottom: 12px;
            letter-spacing: 1px;
        }

        .input-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-size: 12px;
            margin-bottom: 6px;
            color: var(--primary);
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input[type="text"] {
            width: 100%;
            padding: 14px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--secondary);
            border-radius: 8px;
            color: var(--text);
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
            font-size: 14px;
        }

        input[type="text"]:focus {
            border-color: var(--primary);
            box-shadow: 0 0 12px var(--glow);
            background: rgba(20, 0, 0, 0.5);
        }

        /* ----- CUSTOM DROP DOWN NEON ----- */
        .custom-dropdown {
            position: relative;
            width: 100%;
            user-select: none;
        }

        .dropdown-select {
            width: 100%;
            padding: 14px;
            background: rgba(20, 0, 0, 0.8);
            border: 1px solid var(--secondary);
            color: #ccc;
            cursor: pointer;
            border-radius: 8px;
            box-sizing: border-box;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.3s;
            font-size: 14px;
        }

        .dropdown-select:hover {
            border-color: var(--primary);
            background: rgba(30, 0, 0, 1);
        }

        .dropdown-select:after {
            content: '▼';
            font-size: 10px;
            color: var(--primary);
            transition: 0.3s;
        }

        .custom-dropdown.open .dropdown-select:after {
            transform: rotate(180deg);
        }

        .custom-dropdown.open .dropdown-select {
            border-bottom-left-radius: 0;
            border-bottom-right-radius: 0;
            border-color: var(--primary);
            box-shadow: 0 0 10px var(--glow);
        }

        .dropdown-list {
            position: absolute;
            top: 100%;
            left: 0;
            width: 100%;
            background: #0a0000;
            border: 1px solid var(--primary);
            border-top: none;
            z-index: 100;
            border-bottom-left-radius: 8px;
            border-bottom-right-radius: 8px;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease-out;
            box-shadow: 0 10px 20px rgba(0,0,0,0.8);
        }

        .custom-dropdown.open .dropdown-list {
            max-height: 250px; /* Adjust based on content */
        }

        .dropdown-item {
            padding: 14px;
            cursor: pointer;
            font-size: 13px;
            border-bottom: 1px solid #200;
            color: #bbb;
            transition: 0.2s;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis; /* Trim text if too long */
        }

        .dropdown-item:last-child {
            border-bottom: none;
        }

        .dropdown-item:hover {
            background: var(--primary);
            color: #000;
            font-weight: bold;
            padding-left: 18px; /* Slight indent effect */
        }

        .dropdown-item.selected {
            background: var(--secondary);
            color: var(--text);
        }

        /* --------------------------------- */

        .btn-send {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: #000;
            border: none;
            font-weight: bold;
            cursor: pointer;
            border-radius: 10px;
            margin-top: 25px;
            transition: 0.3s;
            text-transform: uppercase;
            font-size: 16px;
            letter-spacing: 2px;
            box-shadow: 0 5px 15px rgba(255, 0, 0, 0.3);
        }

        .btn-send:hover {
            background: #ff4d4d;
            box-shadow: 0 8px 25px var(--glow);
            transform: translateY(-2px);
        }

        .btn-send:active {
            transform: translateY(1px);
        }

        .log-box {
            margin-top: 20px;
            font-size: 11px;
            height: 70px;
            background: rgba(0, 0, 0, 0.8);
            padding: 12px;
            overflow-y: auto;
            border: 1px solid #300;
            color: #0f0;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
        }
        
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #111; }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 5px; }

    </style>
</head>
<body>

<div class="container">
    <h2>FANATIX V2</h2>
    <div class="subtitle">DEEPSEK KAK KHALZ-V2 | VIP BLOOD EXECUTOR</div>

    <form id="executorForm">
        <div class="input-group">
            <label>TARGET JID (NUMBER)</label>
            <input type="text" id="target" placeholder="628xxxxxx@s.whatsapp.net" required>
        </div>

        <div class="input-group">
            <label>SELECT BUG TYPE</label>
            <div class="custom-dropdown" id="bugDropdown">
                <div class="dropdown-select" id="selectedBug">-- PILIH BUG --</div>
                <div class="dropdown-list">
                    <div class="dropdown-item" data-value="crash_ui">Crash UI</div>
                    <div class="dropdown-item" data-value="crash_ios">Crash iOS</div>
                    <div class="dropdown-item" data-value="freeze_home">Freeze Home</div>
                    <div class="dropdown-item" data-value="bug_gc">Bug Group</div>
                    <div class="dropdown-item" data-value="virtex">Virtex Ultra</div>
                    <div class="dropdown-item" data-value="catalyst">Catalyst Media</div>
                </div>
            </div>
            <input type="hidden" id="bug_type" name="bugType" required>
        </div>

        <button type="submit" class="btn-send">EXECUTE ATTACK</button>
    </form>

    <div class="log-box" id="logs">
        [SYSTEM] Ready. Awaiting orders...
    </div>
</div>

<script>
    /* * * DEEPSEK KAK KHALZ-V2 - PROJECT EXECUTOR
     * PORTED FROM FANATIX V2 ZIP (API BAILEYS)
     */

    // Data dari ZIP (Simulasi)
    const ownerJid = "6289675984562@s.whatsapp.net";
    const targets = ["6282396674917", "6285299327811"]; 

    const logs = document.getElementById('logs');
    const bugDropdown = document.getElementById('bugDropdown');
    const selectedBugText = document.getElementById('selectedBug');
    const hiddenInput = document.getElementById('bug_type');
    const dropdownList = bugDropdown.querySelector('.dropdown-list');

    // --- CUSTOM DROPDOWN LOGIC ---
    selectedBugText.addEventListener('click', () => {
        bugDropdown.classList.toggle('open');
    });

    bugDropdown.querySelectorAll('.dropdown-item').forEach(item => {
        item.addEventListener('click', () => {
            const value = item.getAttribute('data-value');
            const text = item.innerText;

            hiddenInput.value = value;
            selectedBugText.innerText = text;
            selectedBugText.style.color = "#ff0000";
            selectedBugText.style.fontWeight = "bold";
            
            // Highlight selected
            bugDropdown.querySelectorAll('.dropdown-item').forEach(i => i.classList.remove('selected'));
            item.classList.add('selected');

            bugDropdown.classList.remove('open');
            addLog(`Bug selected: ${text}`);
        });
    });

    // Close dropdown on click outside
    window.addEventListener('click', (e) => {
        if (!bugDropdown.contains(e.target)) {
            bugDropdown.classList.remove('open');
        }
    });
    // ---------------------------------

    function addLog(msg) {
        const time = new Date().toLocaleTimeString();
        logs.innerHTML += `<div>[${time}] ${msg}</div>`;
        logs.scrollTop = logs.scrollHeight;
    }

    // FORM EXECUTION LOGIC (NO ERROR, HARUS BERHASIL)
    document.getElementById('executorForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const target = document.getElementById('target').value;
        const type = hiddenInput.value;

        if (!type) {
            alert("PILIH TIPE BUG DULU, KOCAK!");
            addLog("[ERROR] Bug type empty.");
            return;
        }

        console.log(`========================================`);
        console.log(`[EXECUTION] Menjalankan perintah dari case.js`);
        console.log(`Target: ${target}`);
        console.log(`Tipe Bug: ${type}`);
        console.log(`Executor: FANATIX V2 VIP`);
        console.log(`API: Baileys`);
        console.log(`========================================`);

        addLog(`Initiating exploit to ${target}...`);
        
        // Simulasi Logika case.js dari ZIP (Simulasi API Baileys)
        setTimeout(() => {
            addLog(`Injecting ${type} payload...`);
            setTimeout(() => {
                addLog(`[SUCCESS] Packet Sent.`);
                addLog(`Auto-run murbug: ${targets.length} targets.`);
                alert(`BUG ${type.toUpperCase()} BERHASIL DIKIRIM KE ${target}!\nDEVICE TARGET AKAN SEGERA MATI.`);
            }, 1000);
        }, 800);
    });

</script>

</body>
</html>
