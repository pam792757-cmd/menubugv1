<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ WA-TOOL ULTIMATE - cvAI4</title>
    <style>
        :root { --neon: #00ffff; --bg: #0a1a2f; --card: rgba(10, 30, 45, 0.9); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: linear-gradient(145deg, #0a1a2f, #1a3f5a); color: white; min-height: 100vh; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: var(--card); backdrop-filter: blur(15px); border-radius: 30px; padding: 25px; border: 1px solid var(--neon); box-shadow: 0 10px 30px rgba(0,255,255,0.2); }
        
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 10px; border-bottom: 1px solid rgba(0,255,255,0.2); }
        .tab-btn { padding: 10px 20px; border: 1px solid var(--neon); background: transparent; color: var(--neon); border-radius: 15px; cursor: pointer; transition: 0.3s; white-space: nowrap; font-weight: bold; }
        .tab-btn.active { background: var(--neon); color: black; box-shadow: 0 0 15px var(--neon); }

        .content { display: none; animation: fadeIn 0.4s; }
        .content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 20px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.1); }
        .label { font-size: 12px; color: var(--neon); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; display: block; }
        .input-field, .textarea-field { width: 100%; padding: 12px; background: rgba(0,0,0,0.5); border: 1px solid rgba(0,255,255,0.3); color: white; border-radius: 10px; margin-bottom: 15px; outline: none; }
        .input-field:focus { border-color: var(--neon); box-shadow: 0 0 10px rgba(0,255,255,0.2); }

        .btn-action { width: 100%; padding: 15px; background: var(--neon); color: black; border: none; border-radius: 15px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; }
        .btn-action:hover { transform: scale(1.02); filter: brightness(1.2); }

        .log-box { height: 180px; background: #000; border-radius: 15px; padding: 15px; font-family: 'Courier New', monospace; font-size: 11px; overflow-y: auto; margin-top: 15px; border: 1px solid #333; }
        .log-entry { margin-bottom: 5px; color: #0f0; border-left: 2px solid var(--neon); padding-left: 8px; }
        
        .slider-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 10px; }
        input[type=range] { width: 60%; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align:center; margin-bottom: 20px; color: var(--neon); text-shadow: 0 0 10px var(--neon);">⚡ WA-TOOL ULTIMATE</h2>
    
    <div class="tabs">
        <button class="tab-btn active" onclick="openTab(event, 'bom')">💣 BOM</button>
        <button class="tab-btn" onclick="openTab(event, 'crash')">⚠️ CRASH</button>
        <button class="tab-btn" onclick="openTab(event, 'band')">📢 BAND</button>
        <button class="tab-btn" onclick="openTab(event, 'settings')">⚙️ SETTINGS</button>
    </div>

    <div id="bom" class="content active">
        <div class="card">
            <span class="label">Nomor Target</span>
            <input type="number" id="targetBom" class="input-field" placeholder="628xxxxxx">
            
            <span class="label">Isi Pesan</span>
            <textarea id="pesanBom" class="textarea-field" rows="3">🔥 Gacor Tuan! 🔥</textarea>
            
            <div class="slider-row">
                <span>Jumlah: <b id="jmlBomVal">100</b>x</span>
                <input type="range" id="jmlBom" min="1" max="1000" value="100" oninput="updateVal('jmlBomVal', this.value)">
            </div>

            <div class="slider-row">
                <span>Delay: <b id="delayBomVal">300</b>ms</span>
                <input type="range" id="delayBom" min="50" max="2000" value="300" oninput="updateVal('delayBomVal', this.value)">
            </div>

            <button class="btn-action" onclick="startAction('BOM')">💥 EKSEKUSI BOM 💥</button>
            <div class="log-box" id="logBom"></div>
        </div>
    </div>

    <div id="crash" class="content">
        <div class="card">
            <span class="label">Nomor Target</span>
            <input type="number" id="targetCrash" class="input-field" placeholder="628xxxxxx">

            <span class="label">Tipe Payload Bug</span>
            <select id="tipeCrash" class="input-field">
                <option value="UNICODE">UNICODE GLITCH - Memory Leak</option>
                <option value="FREEZE">ZERO WIDTH LOOP - Freeze Chat</option>
                <option value="REVERSE">RLO REVERSE - Logic Error</option>
                <option value="IOS">IOS SPECIAL - Crash App</option>
            </select>

            <div class="slider-row">
                <span>Looping: <b id="loopCrashVal">5</b>x</span>
                <input type="range" id="loopCrash" min="1" max="50" value="5" oninput="updateVal('loopCrashVal', this.value)">
            </div>

            <button class="btn-action" style="background: #ff3e3e;" onclick="startAction('CRASH')">⚠️ KIRIM BUG CRASH ⚠️</button>
            <div class="log-box" id="logCrash"></div>
        </div>
    </div>

    <div id="band" class="content">
        <div class="card">
            <span class="label">Nomor Target (Utama)</span>
            <input type="number" id="targetBand" class="input-field" placeholder="628xxxxxx">

            <span class="label">Pesan Broadcast</span>
            <textarea id="pesanBand" class="textarea-field">⚠️ BROADCAST SYSTEM ⚠️</textarea>
            
            <div class="slider-row">
                <span>Spam Band: <b id="loopBandVal">10</b>x</span>
                <input type="range" id="loopBand" min="1" max="100" value="10" oninput="updateVal('loopBandVal', this.value)">
            </div>

            <button class="btn-action" style="background: #e67e22;" onclick="startAction('BAND')">📢 MULAI SPAM BAND 📢</button>
            <div class="log-box" id="logBand"></div>
        </div>
    </div>

    <div id="settings" class="content">
        <div class="card">
            <p><strong>Status System:</strong> <span style="color:#0f0">READY</span></p><br>
            <p>User: <b>Tuan Gigs</b></p>
            <p>Versi: <b>3.1 (Stable)</b></p>
            <hr style="margin: 15px 0; border: 0.5px solid rgba(255,255,255,0.1);">
            <button class="btn-action" style="background:#555" onclick="location.reload()">🔄 REFRESH ENGINE</button>
        </div>
    </div>
</div>

<script>
    function openTab(evt, tabName) {
        let content = document.getElementsByClassName("content");
        for (let i = 0; i < content.length; i++) content[i].className = "content";
        let buttons = document.getElementsByClassName("tab-btn");
        for (let i = 0; i < buttons.length; i++) buttons[i].className = "tab-btn";
        document.getElementById(tabName).className = "content active";
        evt.currentTarget.className = "tab-btn active";
    }

    function updateVal(id, val) { document.getElementById(id).innerText = val; }

    function addLog(targetId, msg) {
        let log = document.getElementById(targetId);
        let div = document.createElement("div");
        div.className = "log-entry";
        div.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
        log.prepend(div);
    }

    async function startAction(type) {
    let logId = "log" + type.charAt(0) + type.slice(1).toLowerCase();
    let targetId = "target" + type.charAt(0) + type.slice(1).toLowerCase();
    let target = document.getElementById(targetId) ? document.getElementById(targetId).value : "";
    let pesan = document.getElementById("pesan" + type) ? document.getElementById("pesan" + type).value : "";

    if(!target) {
        addLog(logId, `❌ Gagal: Nomor target wajib diisi!`);
        return;
    }

    addLog(logId, `🚀 Mengirim perintah ${type} ke Bot...`);

    // Jembatan ke Bot Termux Tuan
    try {
        const response = await fetch(`http://localhost:3000/execute`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                command: type.toLowerCase(),
                target: target,
                message: pesan,
                jumlah: document.getElementById("jmlBom") ? document.getElementById("jmlBom").value : 1
            })
        });
        
        if(response.ok) {
            addLog(logId, `✅ Bot menerima perintah! Menyerang...`);
        } else {
            addLog(logId, `❌ Bot Offline! Pastikan Bot di Termux sudah jalan.`);
        }
    } catch (err) {
        addLog(logId, `⚠️ Error: Bot tidak merespon (Localhost:3000)`);
    }
}


        addLog(logId, `[INIT] Menghubungkan ke API...`);
        addLog(logId, `[TARGET] Membidik: ${target}`);
        
        setTimeout(() => {
            addLog(logId, `[SUCCESS] Payload ${type} berhasil diluncurkan.`);
        }, 1200);
    }
</script>
</body>
</html>
